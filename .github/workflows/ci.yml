name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    env:
      PYTHONUNBUFFERED: 1

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt -c constraints.txt
          pip install -e .

      - name: Validate package structure
        run: |
          python -c "import src"

      - name: Validate all project imports
        run: |
          python - <<EOF
          import pkgutil
          import src

          errors = []

          for module in pkgutil.walk_packages(src.__path__, src.__name__ + "."):
              try:
                  __import__(module.name)
              except Exception as e:
                  errors.append((module.name, str(e)))

          if errors:
              print("Import errors detected:")
              for module, err in errors:
                  print(f"{module}: {err}")
              raise Exception("Module import validation failed")

          print("All modules imported successfully")
          EOF

      - name: Debug project structure
        run: |
          echo "Working directory:"
          pwd
          echo "Project tree:"
          ls -R

      - name: Lint SQL files
        run: |
          sqlfluff lint sql --dialect postgres

      - name: Validate Airflow DAGs
        run: |
          python - <<EOF
          from airflow.models import DagBag

          dagbag = DagBag(dag_folder="airflow/dags", include_examples=False)

          if dagbag.import_errors:
              print("DAG Import Errors:")
              for dag_id, error in dagbag.import_errors.items():
                  print(f"{dag_id}: {error}")
              raise Exception("DAG validation failed")

          if not dagbag.dags:
              raise Exception("No DAGs detected")

          for dag_id, dag in dagbag.dags.items():
              print(f"Validating DAG: {dag_id}")
              print(f"Tasks: {len(dag.tasks)}")

              if len(dag.tasks) == 0:
                  raise Exception(f"DAG {dag_id} has no tasks")

          print("All DAGs validated successfully")
          EOF

      - name: Run tests with coverage
        run: |
          pytest --cov=src --cov-report=term-missing --cov-report=xml

      - name: Lint code
        run: |
          pip install ruff
          ruff check src tests


      - name: Upload coverage report
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: true
          flags: unittests
          name: codecov-report
          verbose: true
