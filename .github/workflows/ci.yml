name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:

    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: airflow
          POSTGRES_PASSWORD: airflow
          POSTGRES_DB: airflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U airflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PYTHONUNBUFFERED: 1
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: airflow
      DB_USER: airflow
      DB_PASSWORD: airflow

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env for tests
        run: |
          echo "POSTGRES_USER=airflow" >> .env
          echo "POSTGRES_PASSWORD=airflow" >> .env
          echo "POSTGRES_DB=airflow" >> .env
          echo "DB_HOST=localhost" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_NAME=airflow" >> .env
          echo "DB_USER=airflow" >> .env
          echo "DB_PASSWORD=airflow" >> .env
          echo "AIRFLOW_SECRET_KEY=test-secret" >> .env
          echo "AIRFLOW_FERNET_KEY=test-fernet" >> .env

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            constraints.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt -c constraints.txt
          pip install -e .

      - name: Validate package structure
        run: python -c "import src"

      - name: Validate all project imports
        run: |
          python - <<EOF
          import pkgutil
          import src

          errors = []

          for module in pkgutil.walk_packages(src.__path__, src.__name__ + "."):
              try:
                  __import__(module.name)
              except Exception as e:
                  errors.append((module.name, str(e)))

          if errors:
              print("Import errors detected:")
              for module, err in errors:
                  print(f"{module}: {err}")
              raise Exception("Module import validation failed")

          print("All modules imported successfully")
          EOF

      - name: Lint SQL files
        run: sqlfluff lint sql --dialect postgres

      - name: Validate Airflow DAGs
        run: |
          python - <<EOF
          from airflow.models import DagBag

          dagbag = DagBag(dag_folder="airflow/dags", include_examples=False)

          if dagbag.import_errors:
              print("DAG Import Errors:")
              for dag_id, error in dagbag.import_errors.items():
                  print(f"{dag_id}: {error}")
              raise Exception("DAG validation failed")

          if not dagbag.dags:
              raise Exception("No DAGs detected")

          for dag_id, dag in dagbag.dags.items():
              print(f"Validating DAG: {dag_id}")
              print(f"Tasks: {len(dag.tasks)}")

              if len(dag.tasks) == 0:
                  raise Exception(f"DAG {dag_id} has no tasks")

          print("All DAGs validated successfully")
          EOF

      - name: Lint code
        run: |
          pip install ruff
          ruff check src tests

      - name: Run unit tests
        run: pytest

      - name: Run integration tests
        run: pytest -m integration

      - name: Run tests with coverage
        run: pytest --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          flags: unittests
          name: codecov-report
          verbose: true
